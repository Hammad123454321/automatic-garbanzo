name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Typecheck · Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pos_test
      JWT_SECRET: ci-jwt-secret-minimum-32-chars-xxxx
      JWT_REFRESH_SECRET: ci-refresh-secret-32-chars-minimum-x

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install root dependencies
        run: npm ci

      - name: Install API dependencies
        working-directory: apps/api
        run: npm ci

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Typecheck API
        working-directory: apps/api
        run: npx tsc --noEmit

      - name: Build API
        working-directory: apps/api
        run: npm run build

      - name: Build Web
        working-directory: apps/web
        run: npm run build

      - name: Generate Prisma client
        working-directory: apps/api
        run: npx prisma generate

      - name: Run Prisma migrations
        working-directory: apps/api
        run: npx prisma migrate deploy
