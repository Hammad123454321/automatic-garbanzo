name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint · Typecheck · Build · Unit · E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: backend

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      APP_PORT: 4001

      MONGODB_URI: mongodb://localhost:27017/ameer_nasr_test
      MONGODB_DB_NAME: ameer_nasr_test

      REDIS_HOST: localhost
      REDIS_PORT: 6379

      JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET || 'ci-access-secret-32-chars-minimum-x' }}
      JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET || 'ci-refresh-secret-32-chars-minimum-x' }}
      JWT_ACCESS_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 7d

      OTP_SECRET: ${{ secrets.OTP_SECRET || 'ci-otp-secret-minimum-length-for-hmac' }}
      OTP_TTL_SECONDS: 600
      OTP_MAX_ATTEMPTS: 5

      RATE_LIMIT_TTL: 60
      RATE_LIMIT_LIMIT: 10000
      AUTH_THROTTLE_LIMIT: 10000
      AUTH_THROTTLE_TTL: 60000

      SMTP_HOST: ""
      SMTP_PORT: 587
      SMTP_USER: ""
      SMTP_PASS: ""
      MAIL_FROM: "noreply@afunotec.com"

      COOKIE_SECRET: ci-cookie-secret-minimum-32-chars-xx

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test -- --passWithNoTests

      - name: E2E tests
        run: npm run test:e2e -- --runInBand
